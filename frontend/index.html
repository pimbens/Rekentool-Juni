<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekentool Fruitpakketten</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>Rekentool Fruitpakketten</h1>
    <nav><a href="/admin">Beheer</a></nav>
  </header>

  <main>
    <section class="section">
      <h2>Stap 1 — Upload prijslijst van vandaag</h2>
      <div id="active-list-info" class="info-box warning">Laden…</div>

      <div id="drop-zone" class="drop-zone">
        <input type="file" id="file-input" accept=".pdf" class="hidden" />
        <div class="drop-label">
          <span class="icon">📄</span>
          <p>Sleep een PDF hier naartoe of <button class="link-btn" onclick="document.getElementById('file-input').click()">kies een bestand</button></p>
        </div>
        <div id="upload-progress" class="hidden" style="text-align:center;padding:16px">
          <div class="spinner"></div>
          <span id="upload-progress-text">Bezig met uploaden…</span>
        </div>
      </div>
      <div id="upload-result"></div>
    </section>

    <section class="section">
      <h2>Stap 2 — Voer bestelling in</h2>
      <div id="package-order-list"></div>
      <button id="btn-calculate" class="btn-primary" onclick="calculate()">Bereken goedkoopste inkoop</button>
    </section>

    <section class="section hidden" id="section-results">
      <h2>Resultaat</h2>
      <div id="results-container"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
